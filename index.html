<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeniFlow™ Meal Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="save-indicator">✓ Guardado</div>
    <div class="scale-wrapper" id="scale-wrapper">
    <div class="widget-container" style="position: relative;">
        
        <!-- Settings Panel -->
        <div class="settings-panel" id="settings-panel">
            <h3>
                <span>Ajustes Visuales</span>
                <span class="close-settings" onclick="toggleSettings()">✕</span>
            </h3>
            
            <div class="theme-toggle-container">
                <span style="font-size: 0.85rem; font-weight: 600;">Modo Oscuro</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="input-group">
                <label data-i18n="lbl_lang">Idioma / Language</label>
                <select class="custom-select" id="language-select" onchange="updateTheme()">
                    <option value="es">🇪🇸 Español</option>
                    <option value="en">🇺🇸 English</option>
                </select>
            </div>

            <div class="input-group">
                <label data-i18n="lbl_currency">Moneda</label>
                <select class="custom-select" id="currency-symbol" onchange="updateTheme()">
                    <option value="USD">USD ($ Dólares)</option>
                    <option value="COP">COP ($ Pesos Col)</option>
                    <option value="MXN">MXN ($ Pesos Mex)</option>
                    <option value="EUR">EUR (€ Euros)</option>
                    <option value="GBP">GBP (£ Libras)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Color Fondo</label>
                    <input type="color" id="color-bg" class="color-pill" value="#fcfcfc" onchange="updateTheme()">
                </div>
                <div class="input-group">
                    <label>Color de Acento</label>
                    <input type="color" id="color-primary" class="color-pill" value="#FF8C9E" onchange="updateTheme()">
                </div>
            </div>
            <div class="input-group">
                <label data-i18n="lbl_font">Tipografía</label>
                <select class="custom-select" id="font-family" onchange="updateTheme()" style="font-family: inherit;">
                    <option value="'Poppins', sans-serif" style="font-family: 'Poppins', sans-serif;">Poppins (Moderna)</option>
                    <option value="'Times New Roman', Times, serif" style="font-family: 'Times New Roman', Times, serif;">Times New Roman (Clásica)</option>
                    <option value="'Outfit', sans-serif" style="font-family: 'Outfit', sans-serif;">Outfit (Aesthetic)</option>
                    <option value="'Quicksand', sans-serif" style="font-family: 'Quicksand', sans-serif;">Quicksand (Redondeada)</option>
                    <option value="'Caveat', cursive" style="font-family: 'Caveat', cursive; font-size: 1.1rem;">Caveat (A mano)</option>
                </select>
            </div>
            <div class="input-group" style="margin-bottom:0;">
                <label data-i18n="lbl_zoom">Tamaño (Zoom)</label>
                <input type="range" id="widget-zoom" min="0.8" max="1.2" step="0.05" value="1" oninput="updateTheme()">
            </div>
        </div>

        <div class="grid-layout">
            <!-- Left Column -->
            <div class="column">
                <div class="glass-panel main-panel">
                    <h2 class="section-title"><span class="icon-span">💸</span> Presupuesto y Gastos</h2>
                    
                    <div class="form-row">
                        <div class="input-group">
                            <label>Presupuesto Semanal</label>
                            <div class="amount-editable-wrapper">
                                <span class="currency-prefix">$</span>
                                <input type="number" class="custom-input save-data large-input" id="budget-total" placeholder="0.00" oninput="calculateBudget()">
                            </div>
                            <div class="progress-container-inline">
                                <div class="progress-bar-bg">
                                    <div id="budget-progress" class="progress-bar-fill"></div>
                                </div>
                                <span id="budget-percent" class="percent-text">0%</span>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Día del Gasto</label>
                            <div class="select-wrapper">
                                <span class="input-icon">📅</span>
                                <select class="custom-select save-data" id="expense-day">
                                    <option value="Lunes">Lunes</option>
                                    <option value="Martes">Martes</option>
                                    <option value="Miércoles">Miércoles</option>
                                    <option value="Jueves">Jueves</option>
                                    <option value="Viernes">Viernes</option>
                                    <option value="Sábado">Sábado</option>
                                    <option value="Domingo">Domingo</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="input-group" style="margin-top: 1rem;">
                        <label>Detalle y Monto del Gasto</label>
                        <div class="expense-input-row">
                            <input type="text" class="custom-input" id="expense-desc" placeholder="Detalle del gasto..." style="flex: 3;">
                            <div class="price-input-wrapper" style="flex: 1.5;">
                                <span class="currency-label">$</span>
                                <input type="number" class="custom-input" id="expense-amount" placeholder="0.00">
                            </div>
                            <button class="add-btn" onclick="addExpense()">+</button>
                        </div>
                    </div>

                    <div id="expense-list-container" class="expense-list-container">
                        <ul id="expense-list" class="expense-list"></ul>
                    </div>

                    <div class="action-row">
                        <button class="link-btn" onclick="clearExpenses()">
                            <span class="rotate-icon">↺</span> Reiniciar Gastos
                        </button>
                    </div>

                    <div class="summary-cards">
                        <div class="summary-card">
                            <label>Gasto Semanal</label>
                            <div id="spent-amount" class="summary-amount">$0.00</div>
                            <div class="summary-icon wallet-icon">👛</div>
                        </div>
                        <div class="summary-card">
                            <label>Restante</label>
                            <div id="remaining-amount" class="summary-amount positive">$0.00</div>
                            <div class="summary-icon chart-icon">📊</div>
                        </div>
                    </div>

                    <div class="quote-card">
                        <div class="quote-icon">✨</div>
                        <p id="motivational-message">Un dólar ahorrado es un paso más hacia tus metas. 💸</p>
                    </div>

                    <div class="footer">
                        <div class="branding">BY NENICREATOR</div>
                        <div class="footer-actions">
                            <button class="circle-btn" onclick="toggleSettings()">⚙️</button>
                            <button class="pill-btn" onclick="resetPlanner()">↺ Reiniciar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="column">
                <div class="glass-panel">
                    <!-- Control de Recetas -->
                    <div class="section-container">
                        <h2 class="section-title"><span class="icon-span">📖</span> Control de Recetas</h2>
                        <div class="input-group">
                            <label>Nombre de la Receta</label>
                            <input type="text" class="custom-input save-data" id="recipe-name" placeholder="Ej: Pasta al Pesto">
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label><span class="label-icon">🕒</span> Tiempo (min)</label>
                                <div class="input-with-suffix">
                                    <input type="number" class="custom-input save-data" id="recipe-time" placeholder="30">
                                    <span class="suffix">min</span>
                                </div>
                            </div>
                            <div class="input-group">
                                <label><span class="label-icon chart-small">📊</span> Dificultad</label>
                                <select class="custom-select save-data" id="recipe-diff">
                                    <option value="easy">🟢 Fácil</option>
                                    <option value="medium">🟡 Medio</option>
                                    <option value="hard">🔴 Difícil</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label><span class="label-icon tag-icon">🏷️</span> Categoría</label>
                            <select class="custom-select save-data" id="recipe-cat">
                                <option value="healthy">🟢 Saludable</option>
                                <option value="fast">⚡ Rápido</option>
                                <option value="budget">💰 Económico</option>
                            </select>
                        </div>
                    </div>

                    <div class="separator"></div>

                    <!-- Preparación de Comidas -->
                    <div class="section-container">
                        <h2 class="section-title"><span class="icon-span">🍳</span> Preparación de Comidas</h2>
                        <div class="form-row">
                            <div class="input-group">
                                <label><span class="label-icon">🍲</span> Cocinar con anticipación</label>
                                <textarea class="custom-textarea save-data" id="prep-cook" placeholder="Ej: Arroz, lavar vegetales..."></textarea>
                            </div>
                            <div class="input-group">
                                <label><span class="label-icon">❄️</span> Refrigerar / Congelar</label>
                                <textarea class="custom-textarea save-data" id="prep-freeze" placeholder="Ej: Pollo marinado, siopas..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="separator"></div>

                    <!-- Registro de Comidas Diario -->
                    <div class="section-container">
                        <h2 class="section-title"><span class="icon-span">📅</span> Registro de Comidas Diario</h2>
                        <div class="meal-grid">
                            <div class="input-group">
                                <label><span class="label-icon">☀️</span> Desayuno</label>
                                <input type="text" class="custom-input save-data" id="meal-breakfast" placeholder="Ej: Avena con frutas...">
                            </div>
                            <div class="input-group">
                                <label><span class="label-icon">🌤️</span> Almuerzo</label>
                                <input type="text" class="custom-input save-data" id="meal-lunch" placeholder="Ej: Pollo con vegetales...">
                            </div>
                            <div class="input-group">
                                <label><span class="label-icon">🌙</span> Cena</label>
                                <input type="text" class="custom-input save-data" id="meal-dinner" placeholder="Ej: Ensalada ligera...">
                            </div>
                            <div class="input-group">
                                <label><span class="label-icon">🍿</span> Snacks</label>
                                <input type="text" class="custom-input save-data" id="meal-snacks" placeholder="Ej: Almendras, yogurt...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script src="script.js"></script>
    </div> <!-- close scale-wrapper -->
</body>
</html>
